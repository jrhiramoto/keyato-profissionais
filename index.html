<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Keyato</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .catalogo {
      width: 100vw;
      height: 100vh;
    }

    .catalogo iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* LOGO PREMIUM AJUSTADA */
    .logo-keyato {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 1000;

      width: 78px;
      border-radius: 10px;

      box-shadow:
        0 6px 18px rgba(0, 0, 0, 0.12);

      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .logo-keyato:hover {
      transform: translateY(-1px);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .logo-keyato img {
      width: 100%;
      display: block;
    }

    /* BOTÃO WHATSAPP PREMIUM */
    .whatsapp {
      position: fixed;
      right: 20px;
      bottom: 88px;
      z-index: 999;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 13px 20px;
      border-radius: 999px;

      background: linear-gradient(135deg, #25D366, #1ebe5d);
      color: #fff;

      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;

      box-shadow:
        0 10px 25px rgba(37, 211, 102, 0.35),
        0 4px 10px rgba(0, 0, 0, 0.15);

      transition: all 0.25s ease;
    }

    .whatsapp:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 14px 35px rgba(37, 211, 102, 0.45),
        0 6px 14px rgba(0, 0, 0, 0.18);
    }

    .whatsapp svg {
      display: block;
      flex-shrink: 0;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .logo-keyato {
        top: 14px;
        left: 14px;
        width: 70px;
      }

      .whatsapp {
        right: 14px;
        bottom: 82px;
        padding: 12px 16px;
        font-size: 13px;
      }
    }

  </style>
</head>

<body>

  <!-- LOGO -->
