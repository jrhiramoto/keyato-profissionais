<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Catálogo Keyato</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .catalogo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .catalogo iframe {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: none;
      display: block;
    }

    /* LOGO (NÃO CLICÁVEL) */
    .logo-keyato {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 1000;

      width: 110px;

      border-radius: 0;

      box-shadow:
        0 6px 18px rgba(0, 0, 0, 0.12);

      overflow: hidden;
    }

    .logo-keyato img {
      width: 100%;
      display: block;
    }

    /* BOTÃO WHATSAPP */
    .whatsapp {
      position: fixed;
      right: 20px;
      bottom: 88px;
      z-index: 999;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 13px 20px;
      border-radius: 999px;

      background: linear-gradient(135deg, #25D366, #1ebe5d);
      color: #fff;

      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;

      box-shadow:
        0 10px 25px rgba(37, 211, 102, 0.35),
        0 4px 10px rgba(0, 0, 0, 0.15);

      transition: all 0.25s ease;
    }

    .whatsapp:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 14px 35px rgba(37, 211, 102, 0.45),
        0 6px 14px rgba(0, 0, 0, 0.18);
    }

    .whatsapp svg {
      display: block;
      flex-shrink: 0;
    }


    /* BOTÃO COMO COMPRAR */
    .howto-btn {
      position: fixed;
      left: 20px;
      bottom: 150px;
      z-index: 999;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 14px 22px;
      border-radius: 999px;

      background: linear-gradient(135deg, #ffffff, #f7f3ee);
      border: 1px solid rgba(93, 27, 196, 0.35);
      color: #2d164d;

      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.2px;

      box-shadow:
        0 12px 26px rgba(93, 27, 196, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.75);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .howto-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 16px 34px rgba(93, 27, 196, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.85);
      background: linear-gradient(135deg, #ffffff, #efe7ff);
    }

    .howto-btn .howto-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(93, 27, 196, 0.12);
      color: #5d1bc4;
      font-size: 13px;
      line-height: 1;
    }


    /* BOTÃO SKETCHUP */
    .sketchup-btn {
      position: fixed;
      left: 20px;
      bottom: 88px;
      z-index: 999;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 14px 22px;
      border-radius: 999px;

      background: linear-gradient(135deg, #2d2d2d, #111111);
      border: 1px solid rgba(255,255,255,0.18);
      color: #ffffff;

      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;

      box-shadow:
        0 12px 26px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .sketchup-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 16px 34px rgba(0,0,0,0.26),
        inset 0 1px 0 rgba(255,255,255,0.14);
      background: linear-gradient(135deg, #3a3a3a, #151515);
    }

    .sketchup-btn .sketchup-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
      line-height: 1;
    }

    /* MOBILE */
    @media screen and (max-width: 900px) {
      html, body {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
      }

      .catalogo {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        z-index: 1;
      }

      .catalogo iframe {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }

      .logo-keyato {
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        width: 92px;
        z-index: 1000;
      }

      .howto-btn {
        top: calc(max(14px, env(safe-area-inset-top)) + 108px);
        left: 14px;
        bottom: auto;

        padding: 9px 15px;
        gap: 8px;

        font-size: 13px;
        font-weight: 700;

        border-radius: 999px;
        z-index: 1000;
      }

      .howto-btn .howto-icon {
        width: 20px;
        height: 20px;
        font-size: 12px;
      }

      .sketchup-btn {
        display: none !important;
      }

      .whatsapp {
        right: 14px;
        left: auto;
        bottom: calc(72px + env(safe-area-inset-bottom));

        padding: 12px 16px;
        gap: 8px;

        font-size: 0;
        z-index: 1000;
      }

      .whatsapp::after {
        content: "Fale Agora com Nossa Equipe de Vendas";
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.1px;
        color: #fff;
        white-space: nowrap;
      }

      .whatsapp:hover {
        transform: none;
      }
    }


  </style>
</head>

</html>
