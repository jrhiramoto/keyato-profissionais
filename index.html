<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Keyato</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .catalogo {
      width: 100vw;
      height: 100vh;
    }

    .catalogo iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* BOTÃO PREMIUM */
    .whatsapp {
      position: fixed;
      right: 20px;
      bottom: 88px;
      z-index: 999;

      display: flex;
      align-items: center;
      gap: 10px;

      padding: 12px 18px;
      border-radius: 999px;

      background: rgba(37, 211, 102, 0.92);
      backdrop-filter: blur(8px);

      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;

      box-shadow: 
        0 8px 30px rgba(0,0,0,0.18),
        inset 0 0 0 1px rgba(255,255,255,0.15);

      transition: all 0.25s ease;

      animation: floatIn 0.6s ease;
    }

    .whatsapp:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.22),
        inset 0 0 0 1px rgba(255,255,255,0.2);
    }

    .whatsapp svg {
      display: block;
      flex-shrink: 0;
    }

    /* animação de entrada */
    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .whatsapp {
        right: 14px;
        bottom: 82px;
        padding: 11px 14px;
        font-size: 13px;
      }
    }

  </style>
</head>
