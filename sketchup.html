];const list=document.getElementById("list"),search=document.getElementById("search"),count=document.getElementById("count"),empty=document.getElementById("empty");function normalizar(texto){return (texto||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/º/g,"o")}function escHtml(texto){return (texto||"").toString().replace(/[&<>"']/g,function(c){if(c==="&")return"&amp;";if(c==="<")return"&lt;";if(c===">")return"&gt;";if(c==="\"")return"&quot;";return"&#39;"})}function renderizar(){const termo=normalizar(search.value.trim());const filtrados=arquivos.filter(function(item){return normalizar(item.nome).includes(termo)});list.innerHTML=filtrados.map(function(item){const img=item.imagem?'<img class="thumb" src="'+escHtml(item.imagem)+'" alt="'+escHtml(item.nome)+'">':'<div class="thumb-placeholder">3D</div>';return '<article class="item">'+img+'<div><div class="item-name">'+escHtml(item.nome)+'</div></div><a class="download" href="'+escHtml(item.link)+'" target="_blank" rel="noopener noreferrer">Baixar SketchUp</a></article>'}).join("");count.textContent=filtrados.length+" de "+arquivos.length+" arquivos";empty.style.display=filtrados.length?"none":"block"}search.addEventListener("input",renderizar);renderizar();</script>
