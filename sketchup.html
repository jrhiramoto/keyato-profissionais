    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');
    function normalizar(texto) { return (texto || '').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/º/g, 'o'); }
    function criarThumb(item) {
      if (item.imagem) { const img = document.createElement('img'); img.className='thumb'; img.src=item.imagem; img.alt=item.nome; img.onerror=()=>{ const ph=document.createElement('div'); ph.className='thumb-placeholder'; ph.textContent='3D'; img.replaceWith(ph); }; return img; }
      const ph=document.createElement('div'); ph.className='thumb-placeholder'; ph.textContent='3D'; return ph;
    }
    function renderizar() {
      const termo = normalizar(search.value.trim());
      const filtrados = arquivos.filter(item => normalizar(item.nome).includes(termo));
      list.innerHTML = '';
      filtrados.forEach(item => {
        const article = document.createElement('article'); article.className='item';
        article.appendChild(criarThumb(item));
        const content = document.createElement('div');
        const name = document.createElement('div'); name.className='item-name'; name.textContent=item.nome;
        const link = document.createElement('a'); link.className='download'; link.href=item.link; link.target='_blank'; link.rel='noopener noreferrer'; link.textContent='Download SketchUp';
        content.appendChild(name); article.appendChild(content); article.appendChild(link); list.appendChild(article);
      });
      count.textContent = filtrados.length + ' de ' + arquivos.length + ' arquivos'; empty.style.display = filtrados.length ? 'none' : 'block';
    }
    search.addEventListener('input', renderizar); renderizar();
  </script>
